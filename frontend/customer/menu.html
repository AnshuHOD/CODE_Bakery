<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Menu — Hooda's Bakery</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/config.js"></script>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="brand">🎂 Hooda's Bakery</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="order.html" class="btn-nav">Order Now</a>
    </div>
  </nav>

  <main class="menu-page">
    <h2 class="page-title">Our Menu</h2>
    <p class="page-subtitle">Every creation is baked fresh using high-quality organic ingredients.</p>

    <!-- Category filter buttons -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterMenu(this, 'all')">All Products</button>
      <button class="filter-btn" onclick="filterMenu(this, 'cake')">Cakes</button>
      <button class="filter-btn" onclick="filterMenu(this, 'pastry')">Pastries</button>
      <button class="filter-btn" onclick="filterMenu(this, 'bread')">Breads</button>
      <button class="filter-btn" onclick="filterMenu(this, 'cookie')">Cookies</button>
    </div>

    <!-- Products load here from API -->
    <div class="product-grid" id="productGrid">
      <p class="loading">Loading menu... 🎂</p>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 Hooda's Bakery · Delivering Smiles, One Slice at a Time 🎂</p>
  </footer>

  <script>
    const API = CONFIG.API_BASE;
    let allProducts = [];

    async function loadMenu() {
      try {
        const res = await fetch(`${API}/products?available=true`);
        const data = await res.json();
        allProducts = data.data;
        renderProducts(allProducts);
      } catch (err) {
        document.getElementById('productGrid').innerHTML = '<p>Could not load menu. Please try again.</p>';
      }
    }

    function filterMenu(btn, category) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = category === 'all' ? allProducts : allProducts.filter(p => p.category === category);
      renderProducts(filtered);
    }

    function renderProducts(products) {
      const grid = document.getElementById('productGrid');
      if (!products.length) { grid.innerHTML = '<p>No items in this category.</p>'; return; }
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}" class="product-img"/>` : '<div class="product-img-placeholder">🎂</div>'}
          <div class="product-info">
            <span class="product-category">${p.category}</span>
            <h3>${p.name}</h3>
            <p>${p.description}</p>
            <div class="price-container">
              <span class="price">₹${p.pricePerKg} <span style="font-size: 14px; font-weight: 500; color: #888;">/ kg</span></span>
              <span class="min-size">Min size: ${p.minSizeKg} kg</span>
            </div>
            <a href="order.html?item=${p._id}" class="btn-order">Order This</a>
          </div>
        </div>
      `).join('');
    }

    loadMenu();
  </script>

  <!-- Smart Chatbot Script -->
  <script src="js/chatbot.js"></script>
</body>
</html>
